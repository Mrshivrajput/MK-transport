<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Panel - MK Transports</title>
    <link rel="stylesheet" href="css/driver-styles.css">
    <link rel="stylesheet" href="css/ai-chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Driver Header -->
    <header class="driver-header">
        <div class="container">
            <div class="driver-logo">
                <span class="logo-icon">MK</span>
                <span class="logo-text">Driver Panel</span>
            </div>
            <nav class="driver-nav">
                <a href="driver-login.html" id="loginLink">Login</a>
                <a href="driver-register.html" id="registerLink">Register</a>
                <a href="driver-dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a>
                <a href="#" id="logoutLink" style="display:none;">Logout</a>
            </nav>
        </div>
    </header>

    <!-- Login Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-header">
                <i class="fas fa-truck"></i>
                <h2>Driver Login</h2>
                <p>Access your MK Transports driver account</p>
            </div>
            <form id="driverLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="loginPhone">Phone Number</label>
                    <input type="tel" id="loginPhone" placeholder="Enter your phone number" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p class="auth-switch">Don't have an account? <a href="driver-register.html">Register here</a></p>
            </form>
        </div>
    </section>

    <script src="js/ai-chat.js"></script>
    <script src="js/driver-auth.js"></script>
</body>
</html>
