<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Registration - MK Transports</title>
    <link rel="stylesheet" href="css/driver-styles.css">
    <link rel="stylesheet" href="css/ai-chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Driver Header -->
    <header class="driver-header">
        <div class="container">
            <div class="driver-logo">
                <span class="logo-icon">MK</span>
                <span class="logo-text">Driver Panel</span>
            </div>
            <nav class="driver-nav">
                <a href="driver-login.html">Login</a>
                <a href="driver-register.html" class="active">Register</a>
                <a href="driver-dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a>
                <a href="#" id="logoutLink" style="display:none;">Logout</a>
            </nav>
        </div>
    </header>

    <!-- Registration Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h2>Driver Registration</h2>
                <p>Join MK Transports driver network</p>
            </div>
            <form id="driverRegisterForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="regPhone">Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="Your phone number" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Create password" required>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regVehicleType">Vehicle Type</label>
                    <select id="regVehicleType" required>
                        <option value="">Select Vehicle</option>
                        <option value="truck">Truck</option>
                        <option value="tempo">Tempo</option>
                        <option value="pickup">Pickup</option>
                        <option value="mini_truck">Mini Truck</option>
                        <option value="container">Container</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="regVehicleNumber">Vehicle Number</label>
                        <input type="text" id="regVehicleNumber" placeholder="e.g., DL 01 AB 1234" required>
                    </div>
                    <div class="form-group">
                        <label for="regCapacity">Capacity (in tons)</label>
                        <input type="number" id="regCapacity" placeholder="e.g., 10" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="regLocation">Base Location (City)</label>
                    <input type="text" id="regLocation" placeholder="e.g., Delhi, Gurgaon, Noida" required>
                </div>
                <div class="form-group">
                    <label>Service Areas</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="area" value="delhi"> Delhi</label>
                        <label><input type="checkbox" name="area" value="up"> Uttar Pradesh</label>
                        <label><input type="checkbox" name="area" value="haryana"> Haryana</label>
                        <label><input type="checkbox" name="area" value="rajasthan"> Rajasthan</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Register as Driver</button>
                <p class="auth-switch">Already have an account? <a href="driver-login.html">Login here</a></p>
            </form>
        </div>
    </section>

    <script src="js/ai-chat.js"></script>
    <script src="js/driver-auth.js"></script>
</body>
</html>
